<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-labelledby="title desc">
  <title id="title">Blinking retro Mike banner</title>
  <desc id="desc">A dark retro arcade banner with blue perspective grid lines and the word Mike blinking in neon colors.</desc>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="42%" r="74%">
      <stop offset="0" stop-color="#10184a"/>
      <stop offset="0.42" stop-color="#050721"/>
      <stop offset="1" stop-color="#01020b"/>
    </radialGradient>

    <linearGradient id="fade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#050721" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#050721" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#050721" stop-opacity="0.82"/>
    </linearGradient>

    <filter id="blueGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="titleGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="900" height="8" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="#ffffff" opacity="0.06"/>
      <rect y="4" width="900" height="1" fill="#235dff" opacity="0.12"/>
    </pattern>

    <style>
      .grid {
        fill: none;
        stroke: #1268ff;
        stroke-width: 2.2;
        stroke-linecap: round;
        filter: url(#blueGlow);
        opacity: 0.82;
      }

      .grid.dim {
        stroke-width: 1.4;
        opacity: 0.34;
      }

      .star {
        fill: #d8f7ff;
        opacity: 0.66;
        animation: starBlink 1.1s steps(1, end) infinite;
      }

      .star:nth-of-type(2n) {
        animation-delay: 0.22s;
      }

      .star:nth-of-type(3n) {
        animation-delay: 0.44s;
      }

      .mid {
        fill: #12f79b;
        stroke: #04253b;
        stroke-width: 6;
        opacity: 0.94;
      }

      .front {
        fill: #ffe83a;
        stroke: #073440;
        stroke-width: 3;
        filter: url(#titleGlow);
        animation: titleBlink 1.15s steps(1, end) infinite;
      }

      .title {
        font-family: Impact, "Arial Black", "Courier New", monospace;
        font-size: 124px;
        font-weight: 900;
        letter-spacing: 7px;
        paint-order: stroke fill;
      }

      .scan {
        fill: url(#scanlines);
        mix-blend-mode: screen;
        opacity: 0.55;
      }

      @keyframes titleBlink {
        0% { fill: #ffe83a; opacity: 1; }
        16% { fill: #00f5ff; opacity: 0.92; }
        32% { fill: #ff44d6; opacity: 1; }
        48% { fill: #a7ff2a; opacity: 0.86; }
        64% { fill: #ff7a18; opacity: 1; }
        80% { fill: #ffffff; opacity: 0.72; }
        100% { fill: #ffe83a; opacity: 1; }
      }

      @keyframes starBlink {
        0%, 100% { opacity: 0.72; }
        50% { opacity: 0.16; }
      }
    </style>
  </defs>

  <rect width="900" height="280" fill="url(#vignette)"/>

  <g>
    <circle class="star" cx="84" cy="46" r="1.6"/>
    <circle class="star" cx="153" cy="88" r="1.2"/>
    <circle class="star" cx="238" cy="31" r="1.4"/>
    <circle class="star" cx="318" cy="104" r="1.1"/>
    <circle class="star" cx="379" cy="72" r="1.8"/>
    <circle class="star" cx="469" cy="33" r="1.2"/>
    <circle class="star" cx="552" cy="96" r="1.5"/>
    <circle class="star" cx="642" cy="48" r="1.2"/>
    <circle class="star" cx="733" cy="82" r="1.8"/>
    <circle class="star" cx="812" cy="39" r="1.3"/>
    <circle class="star" cx="111" cy="135" r="1.1"/>
    <circle class="star" cx="790" cy="138" r="1.1"/>
    <circle class="star" cx="52" cy="116" r="1.0"/>
    <circle class="star" cx="201" cy="124" r="1.4"/>
    <circle class="star" cx="286" cy="73" r="1.0"/>
    <circle class="star" cx="426" cy="111" r="1.2"/>
    <circle class="star" cx="509" cy="86" r="1.0"/>
    <circle class="star" cx="594" cy="29" r="1.3"/>
    <circle class="star" cx="682" cy="119" r="1.1"/>
    <circle class="star" cx="858" cy="92" r="1.4"/>
    <circle class="star" cx="23" cy="31" r="1.1"/>
    <circle class="star" cx="875" cy="26" r="1.0"/>
  </g>

  <g opacity="0.88">
    <path class="grid dim" d="M0 40H900"/>
    <path class="grid dim" d="M0 83H900"/>
    <path class="grid dim" d="M0 125H900"/>
    <path class="grid dim" d="M75 0L355 143"/>
    <path class="grid dim" d="M205 0L390 143"/>
    <path class="grid dim" d="M450 0V143"/>
    <path class="grid dim" d="M695 0L510 143"/>
    <path class="grid dim" d="M825 0L545 143"/>
    <path class="grid dim" d="M300 0L410 143"/>
    <path class="grid dim" d="M600 0L490 143"/>
    <path class="grid dim" d="M138 0L360 143"/>
    <path class="grid dim" d="M762 0L540 143"/>
  </g>

  <g>
    <path class="grid" d="M0 156H900"/>
    <path class="grid" d="M0 181H900"/>
    <path class="grid" d="M0 211H900"/>
    <path class="grid" d="M0 248H900"/>
    <path class="grid" d="M120 145V280"/>
    <path class="grid" d="M245 145V280"/>
    <path class="grid" d="M365 145V280"/>
    <path class="grid" d="M450 145V280"/>
    <path class="grid" d="M535 145V280"/>
    <path class="grid" d="M655 145V280"/>
    <path class="grid" d="M780 145V280"/>
    <path class="grid" d="M450 145L390 280"/>
    <path class="grid" d="M450 145L335 280"/>
    <path class="grid" d="M450 145L280 280"/>
    <path class="grid" d="M450 145L222 280"/>
    <path class="grid" d="M450 145L155 280"/>
    <path class="grid" d="M450 145L88 280"/>
    <path class="grid" d="M450 145L0 270"/>
    <path class="grid" d="M450 145L510 280"/>
    <path class="grid" d="M450 145L565 280"/>
    <path class="grid" d="M450 145L620 280"/>
    <path class="grid" d="M450 145L678 280"/>
    <path class="grid" d="M450 145L745 280"/>
    <path class="grid" d="M450 145L812 280"/>
    <path class="grid" d="M450 145L900 270"/>
  </g>

  <rect width="900" height="280" fill="url(#fade)"/>

  <g text-anchor="middle" dominant-baseline="middle">
    <text class="title mid" x="466" y="134">Mike</text>
    <text class="title front" x="460" y="125">Mike</text>
  </g>

  <rect class="scan" width="900" height="280"/>
</svg>
